<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --surface:  #141414;
      --border:   #222;
      --text:     #e5e5e5;
      --muted:    #555;
      --accent:   #fff;
      --user-bg:  #1a1a2e;
      --tag-bg:   #1e1e1e;
      --error:    #7f1d1d;
      --online:   #22c55e;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: ui-sans-serif, system-ui, sans-serif; font-size: 14px; -webkit-font-smoothing: antialiased; }

    /* ── Layout ── */
    .app { display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar { width: 220px; min-width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
    .sidebar-title { font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
    .agent-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .agent-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; cursor: pointer; border-left: 2px solid transparent; transition: background .15s; }
    .agent-item:hover { background: rgba(255,255,255,.03); }
    .agent-item.active { border-left-color: var(--accent); background: rgba(255,255,255,.05); }
    .agent-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--online); flex-shrink: 0; }
    .agent-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .agent-role { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-divider { height: 1px; background: var(--border); margin: 8px 16px; }
    .group-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; cursor: pointer; border-left: 2px solid transparent; transition: background .15s; }
    .group-item:hover { background: rgba(255,255,255,.03); }
    .group-item.active { border-left-color: #7c3aed; background: rgba(124,58,237,.08); }
    .group-dot { width: 7px; height: 7px; border-radius: 50%; background: #7c3aed; flex-shrink: 0; }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .chat-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface); flex-shrink: 0; }
    .chat-title { font-size: 15px; font-weight: 600; }
    .chat-subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .header-actions { display: flex; gap: 8px; }
    .btn-icon { background: none; border: 1px solid var(--border); color: var(--muted); padding: 5px 10px; font-size: 11px; cursor: pointer; border-radius: 3px; transition: color .15s, border-color .15s; }
    .btn-icon:hover { color: var(--text); border-color: var(--muted); }

    /* ── Messages ── */
    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .messages:empty::after { content: 'No messages yet. Start the conversation.'; color: var(--muted); font-size: 13px; margin: auto; }

    .msg { display: flex; flex-direction: column; max-width: 80%; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.agent { align-self: flex-start; align-items: flex-start; }
    .msg-meta { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .msg-bubble { padding: 10px 14px; border-radius: 2px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .msg.user .msg-bubble { background: var(--user-bg); color: var(--text); }
    .msg.agent .msg-bubble { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
    .msg-bubble.streaming::after { content: '▌'; animation: blink .7s infinite; color: var(--muted); }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

    /* Group chat agent block */
    .group-response { background: var(--surface); border: 1px solid var(--border); padding: 14px; }
    .group-response-header { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 8px; }
    .group-response-body { white-space: pre-wrap; word-break: break-word; line-height: 1.6; }
    .group-response-body.streaming::after { content: '▌'; animation: blink .7s infinite; color: var(--muted); }

    /* ── Agent selector (group) ── */
    .agent-selector { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 6px; background: var(--bg); }
    .agent-chip { padding: 4px 10px; font-size: 11px; border: 1px solid var(--border); cursor: pointer; color: var(--muted); border-radius: 2px; transition: all .15s; user-select: none; }
    .agent-chip.selected { border-color: #7c3aed; color: #a78bfa; background: rgba(124,58,237,.1); }
    .select-all { font-size: 11px; color: var(--muted); padding: 4px 10px; cursor: pointer; border: 1px solid transparent; }
    .select-all:hover { color: var(--text); }

    /* ── Input ── */
    .input-area { padding: 16px 20px; border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
    .input-row { display: flex; gap: 10px; align-items: flex-end; }
    textarea { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; font-size: 14px; font-family: inherit; resize: none; border-radius: 2px; line-height: 1.5; outline: none; min-height: 42px; max-height: 160px; transition: border-color .15s; }
    textarea:focus { border-color: var(--muted); }
    textarea::placeholder { color: var(--muted); }
    .send-btn { background: var(--accent); color: #000; border: none; padding: 10px 18px; font-size: 13px; font-weight: 600; cursor: pointer; border-radius: 2px; transition: opacity .15s; flex-shrink: 0; height: 42px; }
    .send-btn:hover { opacity: .85; }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; }
    .input-hint { font-size: 11px; color: var(--muted); margin-top: 6px; }

    /* ── Memory panel ── */
    .memory-panel { width: 260px; border-left: 1px solid var(--border); background: var(--surface); display: none; flex-direction: column; overflow: hidden; }
    .memory-panel.open { display: flex; }
    .memory-header { padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
    .memory-list { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    .memory-entry { background: var(--tag-bg); padding: 10px; border: 1px solid var(--border); }
    .memory-key { font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 4px; }
    .memory-val { font-size: 12px; color: var(--text); line-height: 1.5; word-break: break-word; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header"><span class="sidebar-title">Agents</span></div>
    <div class="agent-list" id="agentList"></div>
  </aside>

  <!-- Main chat -->
  <div class="main" id="main">
    <div class="chat-header">
      <div>
        <div class="chat-title" id="chatTitle">Select an agent</div>
        <div class="chat-subtitle" id="chatSubtitle"></div>
      </div>
      <div class="header-actions">
        <button class="btn-icon" id="memoryBtn" onclick="toggleMemory()">Memory</button>
        <button class="btn-icon" onclick="clearHistory()">Clear history</button>
      </div>
    </div>

    <!-- Group agent selector (hidden by default) -->
    <div class="agent-selector" id="agentSelector" style="display:none"></div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
      <div class="input-row">
        <textarea id="input" placeholder="Message…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="send()" disabled>Send</button>
      </div>
      <div class="input-hint" id="inputHint">Select an agent to start</div>
    </div>
  </div>

  <!-- Memory panel -->
  <div class="memory-panel" id="memoryPanel">
    <div class="memory-header">Memory</div>
    <div class="memory-list" id="memoryList"></div>
  </div>

</div>

<script>
  let agents = [];
  let activeTab = null;
  // chatHistories: { [tab]: Array<{role:'user'|'agent'|'group', content, meta?, agent?}> }
  let chatHistories = {};
  let selectedGroupAgents = new Set();
  let isStreaming = false;
  let memoryOpen = false;

  // ── Init ──────────────────────────────────────────────────────────────────
  async function init() {
    const [agentsRes, initialRes] = await Promise.all([
      fetch('/agents'),
      fetch('/initial-messages'),
    ]);
    agents = await agentsRes.json();
    const initialMessages = await initialRes.json(); // [{agent, content, timestamp}]

    // Pre-populate individual DMs with each agent's finding
    initialMessages.forEach(({ agent, content }) => {
      if (!chatHistories[agent]) chatHistories[agent] = [];
      chatHistories[agent].push({ role: 'agent', content, meta: agent.replace(/_/g,' ') });
    });

    // Pre-populate group chat with all findings in order
    chatHistories['group'] = initialMessages.map(({ agent, content }) => ({
      role: 'group', agent, content,
    }));

    renderSidebar();
  }

  function renderSidebar() {
    const list = document.getElementById('agentList');
    list.innerHTML = '';

    // Group chat button
    const divider = document.createElement('div');
    divider.className = 'sidebar-divider';

    const groupBtn = document.createElement('div');
    groupBtn.className = 'group-item' + (activeTab === 'group' ? ' active' : '');
    groupBtn.innerHTML = `<div class="group-dot"></div><div><div class="agent-name">Group Chat</div><div class="agent-role">Message multiple agents</div></div>`;
    groupBtn.onclick = () => openTab('group');
    list.appendChild(groupBtn);
    list.appendChild(divider);

    agents.forEach(agent => {
      const item = document.createElement('div');
      item.className = 'agent-item' + (activeTab === agent.name ? ' active' : '');
      item.innerHTML = `<div class="agent-dot"></div><div><div class="agent-name">${agent.name.replace(/_/g, ' ')}</div><div class="agent-role">${agent.role}</div></div>`;
      item.onclick = () => openTab(agent.name);
      list.appendChild(item);
    });
  }

  // ── Tab switching ─────────────────────────────────────────────────────────
  function openTab(name) {
    activeTab = name;
    if (!chatHistories[name]) chatHistories[name] = [];
    renderSidebar();

    renderMessages();

    const isGroup = name === 'group';
    document.getElementById('agentSelector').style.display = isGroup ? 'flex' : 'none';
    document.getElementById('sendBtn').disabled = false;

    if (isGroup) {
      document.getElementById('chatTitle').textContent = 'Group Chat';
      document.getElementById('chatSubtitle').textContent = 'Message multiple agents simultaneously';
      document.getElementById('inputHint').textContent = 'Select agents above, then send a message ↑';
      renderGroupSelector();
    } else {
      const agent = agents.find(a => a.name === name);
      document.getElementById('chatTitle').textContent = name.replace(/_/g, ' ');
      document.getElementById('chatSubtitle').textContent = agent?.role ?? '';
      document.getElementById('inputHint').textContent = `Chatting with ${name.replace(/_/g, ' ')} · Enter to send`;
    }

    document.getElementById('input').focus();
    if (memoryOpen) loadMemory();
  }

  // ── Group agent selector ──────────────────────────────────────────────────
  function renderGroupSelector() {
    if (selectedGroupAgents.size === 0) agents.forEach(a => selectedGroupAgents.add(a.name));
    const sel = document.getElementById('agentSelector');
    sel.innerHTML = `<span class="select-all" onclick="toggleAll()">Toggle all</span>`;
    agents.forEach(agent => {
      const chip = document.createElement('div');
      chip.className = 'agent-chip' + (selectedGroupAgents.has(agent.name) ? ' selected' : '');
      chip.textContent = agent.name.replace(/_/g, ' ');
      chip.onclick = () => {
        if (selectedGroupAgents.has(agent.name)) selectedGroupAgents.delete(agent.name);
        else selectedGroupAgents.add(agent.name);
        renderGroupSelector();
      };
      sel.appendChild(chip);
    });
  }

  function toggleAll() {
    if (selectedGroupAgents.size === agents.length) selectedGroupAgents.clear();
    else agents.forEach(a => selectedGroupAgents.add(a.name));
    renderGroupSelector();
  }

  // ── Messages ──────────────────────────────────────────────────────────────
  function renderMessages() {
    const container = document.getElementById('messages');
    container.innerHTML = '';
    (chatHistories[activeTab] || []).forEach(entry => {
      if (entry.role === 'group') {
        container.appendChild(makeGroupNode(entry.agent, entry.content));
      } else {
        container.appendChild(makeMsgNode(entry.role, entry.content, entry.meta));
      }
    });
    scrollToBottom();
  }

  function makeMsgNode(role, text, meta) {
    const msg = document.createElement('div');
    msg.className = `msg ${role}`;
    msg.innerHTML = `<div class="msg-meta">${escHtml(meta || (role === 'user' ? 'You' : activeTab.replace(/_/g,' ')))}</div><div class="msg-bubble">${escHtml(text)}</div>`;
    return msg;
  }

  function makeGroupNode(agentName, text) {
    const wrapper = document.createElement('div');
    wrapper.className = 'group-response';
    wrapper.innerHTML = `<div class="group-response-header">${escHtml(agentName.replace(/_/g,' '))}</div><div class="group-response-body">${escHtml(text)}</div>`;
    return wrapper;
  }

  // Append a message to the active tab — adds to history and live DOM
  function appendMessage(role, text, meta = '') {
    const entry = { role, content: text, meta: meta || (role === 'user' ? 'You' : activeTab.replace(/_/g,' ')) };
    chatHistories[activeTab].push(entry);
    const node = makeMsgNode(role, text, entry.meta);
    document.getElementById('messages').appendChild(node);
    scrollToBottom();
    return node.querySelector('.msg-bubble');
  }

  // Append a streaming group response block — saves to history when done
  function appendGroupResponse(agentName) {
    const entry = { role: 'group', agent: agentName, content: '' };
    chatHistories[activeTab].push(entry);
    const node = makeGroupNode(agentName, '');
    const body = node.querySelector('.group-response-body');
    body.classList.add('streaming');
    document.getElementById('messages').appendChild(node);
    scrollToBottom();
    // Return a proxy object that updates both the live DOM and the history entry
    return {
      append(delta) { entry.content += delta; body.textContent = entry.content; scrollToBottom(); },
      done() { body.classList.remove('streaming'); },
    };
  }

  function scrollToBottom() {
    const m = document.getElementById('messages');
    m.scrollTop = m.scrollHeight;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Send ──────────────────────────────────────────────────────────────────
  async function send() {
    if (isStreaming || !activeTab) return;
    const input = document.getElementById('input');
    const message = input.value.trim();
    if (!message) return;

    input.value = '';
    autoResize(input);
    setStreaming(true);

    appendMessage('user', message, 'You');

    if (activeTab === 'group') {
      await sendGroup(message);
    } else {
      await sendAgent(activeTab, message);
    }

    setStreaming(false);
  }

  async function sendAgent(agentName, message) {
    // Add a placeholder entry to history, then stream into it
    const entry = { role: 'agent', content: '', meta: agentName.replace(/_/g,' ') };
    chatHistories[activeTab].push(entry);
    const node = makeMsgNode('agent', '', entry.meta);
    const bubble = node.querySelector('.msg-bubble');
    bubble.classList.add('streaming');
    document.getElementById('messages').appendChild(node);
    scrollToBottom();

    const res = await fetch(`/chat/${agentName}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      entry.content += decoder.decode(value, { stream: true });
      bubble.textContent = entry.content;
      scrollToBottom();
    }

    bubble.classList.remove('streaming');
    scrollToBottom();
  }

  async function sendGroup(message) {
    const selected = [...selectedGroupAgents];
    if (!selected.length) return;

    const handles = {};
    selected.forEach(name => { handles[name] = appendGroupResponse(name); });

    const res = await fetch('/group', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, agents: selected }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const lines = decoder.decode(value, { stream: true }).split('\n').filter(Boolean);
      for (const line of lines) {
        try {
          const ev = JSON.parse(line);
          if (ev.chunk && handles[ev.agent]) handles[ev.agent].append(ev.chunk);
          if (ev.done && handles[ev.agent]) handles[ev.agent].done();
        } catch {}
      }
    }
  }

  // ── Memory ────────────────────────────────────────────────────────────────
  function toggleMemory() {
    memoryOpen = !memoryOpen;
    document.getElementById('memoryPanel').classList.toggle('open', memoryOpen);
    if (memoryOpen) loadMemory();
  }

  async function loadMemory() {
    if (!activeTab) return;
    const agentName = activeTab === 'group' ? 'shared' : activeTab;
    const res = await fetch(`/memory/${agentName}`);
    const entries = await res.json();
    const list = document.getElementById('memoryList');
    list.innerHTML = '';
    if (!entries.length) {
      list.innerHTML = '<div style="color:var(--muted);font-size:12px">No memory entries yet.</div>';
      return;
    }
    entries.forEach(e => {
      const el = document.createElement('div');
      el.className = 'memory-entry';
      el.innerHTML = `<div class="memory-key">${escHtml(e.key)}</div><div class="memory-val">${escHtml(e.value)}</div>`;
      list.appendChild(el);
    });
  }

  // ── Clear history ─────────────────────────────────────────────────────────
  async function clearHistory() {
    if (!activeTab) return;
    const target = activeTab === 'group' ? 'all' : activeTab;
    await fetch(`/history/${target}`, { method: 'DELETE' });
    chatHistories[activeTab] = [];
    renderMessages();
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function setStreaming(val) {
    isStreaming = val;
    document.getElementById('sendBtn').disabled = val;
    document.getElementById('input').disabled = val;
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  init();
</script>
</body>
</html>
